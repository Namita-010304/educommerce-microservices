server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/student_service_db?createDatabaseIfNotExist=true
    username: root
    password: system
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

jwt:
  secret: roz98I2ldQVAly2sMZol6hD8xyZaH8sMh3ygHlVmGLR
  expiration: 86400000

attendance:
  threshold: 75

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
